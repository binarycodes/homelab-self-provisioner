- name: "{{ app.name }} | remove DNS stub listener"
  ansible.builtin.lineinfile:
    dest: /etc/systemd/resolved.conf
    regexp: '^(#\s*)?DNSStubListener.*'
    line: "DNSStubListener=no"
    state: present
    backup: true
  register: _resolved_stub

- name: "{{ app.name }} | restart resolved to release port 53"
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: restarted
    daemon_reload: true
  when: _resolved_stub is changed
